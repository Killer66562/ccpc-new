services:
  app:
    image: composer:latest
    environment:
      - DB_CONNECTION=postgresql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=ccpc
      - DB_USERNAME=ccpc
      - DB_PASSWORD=password # Change it to your own password
    
  db:
    image: postgres:18-alpine
    environment:
      - POSTGRES_DB=ccpc
      - POSTGRES_USER=ccpc
      - POSTGRES_PASSWORD=password # Change it to your own password
    expose:
      - 5432
    volumes:
      - db:/var/lib/postgresql

volumes:
  db: